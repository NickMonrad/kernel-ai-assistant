name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── Validate repo structure ──────────────────────────────────────
      - name: Check required files exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          echo "Repo structure OK"

      # ── Android build ──────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (debug)
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

      # - name: Lint
      #   run: ./gradlew lint

      # - name: Unit tests
      #   run: ./gradlew test

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results-${{ github.sha }}
      #     path: '**/build/reports/tests/'
      #     retention-days: 14

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/
          retention-days: 14

      - name: Publish PR preview APK
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="pr-${PR_NUMBER}"

          # Upsert the pr-N pre-release (delete first so we can re-attach the APK)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -f "$TAG"
          git push -f origin "$TAG"
          gh release create "$TAG" "$APK" \
            --title "PR #${PR_NUMBER} debug build — ${SHORT_SHA}" \
            --notes "Debug APK for PR #${PR_NUMBER}. Commit: ${GITHUB_SHA}. Build #${BUILD_NUMBER}." \
            --prerelease

          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/app-debug.apk"

          # Build comment JSON (pass body via argv to avoid quoting/encoding issues)
          COMMENT_BODY="<!-- pr-apk-comment -->
## 📦 Debug APK ready

**[⬇️ Download app-debug.apk](${APK_URL})**

Commit: \`${SHORT_SHA}\` · Build #${BUILD_NUMBER}

_Updated on each push to this branch. Removed when the PR is merged or closed._"

          python3 -c "import json,sys; print(json.dumps({'body': sys.argv[1]}))" \
            "$COMMENT_BODY" > /tmp/pr-comment.json

          # Post or update sticky comment (identified by marker in first line)
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- pr-apk-comment -->"))][0].id // empty')

          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              -X PATCH --input /tmp/pr-comment.json
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -X POST --input /tmp/pr-comment.json
          fi

      - name: Publish debug release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SHORT_SHA=${GITHUB_SHA::7}

          # Look up the PR(s) associated with this commit (squash-merge lands as a single commit)
          PR_JSON=$(gh api repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls \
            -H "Accept: application/vnd.github+json" 2>/dev/null || echo "[]")

          PR_NUMBER=$(echo "$PR_JSON" | python3 -c \
            "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else '')" 2>/dev/null)
          PR_TITLE=$(echo "$PR_JSON" | python3 -c \
            "import sys,json; prs=json.load(sys.stdin); print(prs[0]['title'] if prs else '')" 2>/dev/null)
          PR_BODY=$(echo "$PR_JSON" | python3 -c \
            "import sys,json; prs=json.load(sys.stdin); print(prs[0]['body'] or '' if prs else '')" 2>/dev/null)

          if [ -n "$PR_NUMBER" ]; then
            RELEASE_TITLE="Debug build ${SHORT_SHA} — ${PR_TITLE}"
            RELEASE_NOTES="## PR #${PR_NUMBER}: ${PR_TITLE}

          ${PR_BODY}

          ---
          **Commit:** \`${GITHUB_SHA}\`
          **Build:** #${{ github.run_number }}"
          else
            # Direct push to main (no associated PR)
            COMMIT_MSG=$(git log -1 --pretty=format:"%s" $GITHUB_SHA)
            RELEASE_TITLE="Debug build ${SHORT_SHA} — ${COMMIT_MSG}"
            RELEASE_NOTES="Direct push to main (no associated PR).

          **Commit:** \`${GITHUB_SHA}\`
          **Message:** ${COMMIT_MSG}
          **Build:** #${{ github.run_number }}"
          fi

          # Delete existing debug-latest tag/release if present
          gh release delete debug-latest --repo $GITHUB_REPOSITORY --yes 2>/dev/null || true
          git tag -f debug-latest
          git push -f origin debug-latest
          gh release create debug-latest "$APK" \
            --repo $GITHUB_REPOSITORY \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --prerelease

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Validate repo structure ──────────────────────────────────────
      - name: Check required files exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          echo "Repo structure OK"

      # ── Android build ──────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (debug)
        run: ./gradlew assembleDebug

      # - name: Lint
      #   run: ./gradlew lint

      # - name: Unit tests
      #   run: ./gradlew test

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results-${{ github.sha }}
      #     path: '**/build/reports/tests/'
      #     retention-days: 14

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/
          retention-days: 14

      - name: Publish debug release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SHORT_SHA=${GITHUB_SHA::7}
          # Delete existing debug-latest tag/release if present
          gh release delete debug-latest --repo $GITHUB_REPOSITORY --yes 2>/dev/null || true
          git tag -f debug-latest
          git push -f origin debug-latest
          gh release create debug-latest "$APK" \
            --repo $GITHUB_REPOSITORY \
            --title "Debug build (${SHORT_SHA})" \
            --notes "Latest debug APK from commit ${GITHUB_SHA}" \
            --prerelease

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Validate repo structure ──────────────────────────────────────
      - name: Check required files exist
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          echo "Repo structure OK"

